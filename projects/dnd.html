        <link rel="apple-touch-icon" type="image/png" sizes="167x167" href="../favicon-167x167.png">

    <body class="page">
        <header style="height: 6rem">
            <nav id="topbanner" class="navbar navbar-dark navbar-expand-lg">
                <div class="container">
                    <a class="navbar-brand" href="../">
                        <div class="d-flex flex-column">
                            <img src="../images/blairware light.svg" alt="blairware logo" width="250">
                            <p class="text-center text-white fw-light" style="height: 1rem">Ryan Blair | Programmer</p>
                        </div>
                    </a>
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarBlairware" aria-controls="navbarBlairware" aria-expanded="false" aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon navbar-toggler-icon-light"></span>
                    </button>  
                    <div class="collapse navbar-collapse" id="navbarBlairware">
                        <ul class="navbar-nav ms-auto mb-2 mb-lg-0 float-end">
                            <li class="nav-item">
                                <a class="nav-link active text-white float-end" aria-current="page" href="../">Home</a>
                            </li>
                            <li class="nav-link">
                                <a href="https://twitter.com/RyanBlairware?ref_src=twsrc%5Etfw" class="twitter-follow-button float-end" data-size="large" data-dnt="true" data-show-count="false">Follow @RyanBlairware</a>
                            </li>
                        </ul>
                    </div>
                </div>
            </nav>
        </header>

		<main class="container">
			<div class="px-4 my-3 text-center">
                <h1 class="display-3 fw-bold">D&amp;D Character Idea Generator</h1>
                <div class="col-lg-8 mx-auto">
                    <p class="intro">Every race, class and background accessible on <a href="http://dnd5e.wikidot.com">dnd5e.wikidot.com</a> has a chance to be generated. Clicking on one of these attributes will open that attribute's wikidot page in a new tab.</p>
                </div> 
			<div>
				<p class="generated">
					<span id="Alignment" 	class="spanA"></span>
					<a id="hRace" 	 		class="spanR"	href='#' 	target="_blank"></a>
					<a id="hFirstClass" 	class="spanC"	href='#'	target="_blank"></a>
					<a id="hSecondClass"	class="spanC"	href='#'	target="_blank"></a>
					<a id="hBackground" 	class="spanB"	href='#'	target="_blank"></a>
				</p>
			</div>
            <button class="generate" onclick="randomise()">Generate Character</button>
			<footer style="height: 6rem"></footer>
    	</main>
	</body>
    <script async src="https://platform.twitter.com/widgets.js" charset="utf-8"></script> <!-- mmm twitter -->
